# Cloudflare Wrangler config — Workers + Static Assets (SSR).
# Astro (output:'server', @astrojs/cloudflare v12) builds to ./dist with the
# SSR worker entry at dist/_worker.js/index.js. Deployed with `wrangler deploy`,
# which creates/updates the Worker on first deploy — no pre-created project.
# Static files in ./dist are served from the edge; only misses invoke the Worker.
# Ref: https://developers.cloudflare.com/workers/static-assets/migration-guides/migrate-from-pages/
#
# NOTE: `name` MUST match the Worker that your Workers Build (Settings > Builds)
# is connected to in the dashboard, or `wrangler deploy` errors on a name clash.

name = "stencilmaker"
main = "dist/_worker.js/index.js"
compatibility_date = "2026-05-27"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
# Defaults suit this site: html_handling = "auto-trailing-slash",
# not_found_handling = "none", run_worker_first = false. _worker.js and
# _routes.json are kept out of the public asset set via dist/.assetsignore.

[observability]
enabled = true

# ---------------------------------------------------------------------------
# Bindings & env — this file is the SOURCE OF TRUTH for a Git-deployed Worker.
# `wrangler deploy` (run by Workers Builds on every push) reconciles bindings
# from here, so a binding added only in the dashboard can be overwritten — keep
# them in this file and commit. src/pages/api/lead.ts reads them via
# `locals.runtime?.env` (DB, LEADS_KV, RESEND_*, LEAD_NOTIFY_EMAIL).
#
# WHERE EACH VALUE LIVES (see DEPLOY-CLOUDFLARE.md §4 — three separate places):
#   • DB / LEADS_KV ........ here (uncomment once provisioned; paste the real id).
#   • Runtime SECRETS ...... NOT here. `wrangler secret put TURNSTILE_SECRET`
#     (+ RESEND_API_KEY, RESEND_FROM_EMAIL, LEAD_NOTIFY_EMAIL) or Worker dashboard
#     → Settings → Variables and Secrets. Never put secrets in [vars] (plaintext).
#   • PUBLIC_TURNSTILE_SITE_KEY ... NOT here and NOT a secret. It is a BUILD
#     variable (dashboard → the Worker → Settings → Builds), because Astro inlines
#     import.meta.env.PUBLIC_* at build time. A .env file does NOT reach the
#     cloud build. For local `wrangler dev`, runtime secrets go in `.dev.vars`.
# ---------------------------------------------------------------------------

# Uncomment after `wrangler d1 create stencilmaker-leads` and paste the printed id:
[[d1_databases]]
binding = "DB"
database_name = "stencilmaker-leads"
database_id = "69fd3f64-c54b-4c58-a665-6f4e829a4879"

# Uncomment after `wrangler kv namespace create LEADS_KV` and paste the printed id:
[[kv_namespaces]]
binding = "LEADS_KV"
id = "9a33069191fc470dbcc4f1a36354986a"

# Non-secret runtime vars only (visible in source). RESEND_FROM_EMAIL can live
# here OR be set as a runtime var/secret in the dashboard — pick one place.
# [vars]
# RESEND_FROM_EMAIL = "hello@thestencilmaker.com"
