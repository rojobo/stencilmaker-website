# Cloudflare Wrangler config for local Pages emulation and deployment.
# Astro builds to ./dist; Wrangler serves that as a Cloudflare Pages project.
# Reference: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "stencilmaker-website"
compatibility_date = "2026-05-27"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

[assets]
directory = "./dist"

# ---------------------------------------------------------------------------
# Bindings — uncomment once each resource has been provisioned in the
# Cloudflare dashboard or via `wrangler` CLI. See DEPLOY-CLOUDFLARE.md.
# ---------------------------------------------------------------------------

