# Cloudflare Wrangler config — Workers + Static Assets (SSR).
# Astro (output:'server', @astrojs/cloudflare v12) builds to ./dist with the
# SSR worker entry at dist/_worker.js/index.js. Deployed with `wrangler deploy`,
# which creates/updates the Worker on first deploy — no pre-created project.
# Static files in ./dist are served from the edge; only misses invoke the Worker.
# Ref: https://developers.cloudflare.com/workers/static-assets/migration-guides/migrate-from-pages/
#
# NOTE: `name` MUST match the Worker that your Workers Build (Settings > Builds)
# is connected to in the dashboard, or `wrangler deploy` errors on a name clash.

name = "stencilmaker"
main = "dist/_worker.js/index.js"
compatibility_date = "2026-05-27"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
# Defaults suit this site: html_handling = "auto-trailing-slash",
# not_found_handling = "none", run_worker_first = false. _worker.js and
# _routes.json are kept out of the public asset set via dist/.assetsignore.

[observability]
enabled = true

# ---------------------------------------------------------------------------
# Bindings — uncomment once each resource is provisioned. src/pages/api/lead.ts
# reads these via `locals.runtime?.env` (DB, LEADS_KV, RESEND_*, LEAD_NOTIFY_EMAIL).
# On Workers, set secrets with `wrangler secret put NAME` or in the Worker's
# dashboard Settings — they no longer come from a Pages project. See DEPLOY-CLOUDFLARE.md.
# ---------------------------------------------------------------------------

# [[d1_databases]]
# binding = "DB"
# database_name = "stencilmaker-leads"
# database_id = "REPLACE_WITH_D1_ID"

# [[kv_namespaces]]
# binding = "LEADS_KV"
# id = "REPLACE_WITH_KV_ID"

